<!DOCTYPE html>
<html>
<head>
    <title>App Installer</title>
    <link rel="stylesheet" href="UI.css">
</head>
<body>
    <h1>Install an App</h1>
    <input type="text" id="packageName" placeholder="Enter package name">
    <select id="method">
        <option value="flatpak">Flatpak</option>
        <option value="package">System Package Manager</option>
    </select>
    <button onclick="installApp()">Install</button>
    <pre id="output"></pre>

    <script type="text/javascript">
        async function installApp() {
            const name = document.getElementById("packageName").value;
            const method = document.getElementById("method").value;
            const result = await eel.install_app(name, method)();
            document.getElementById("output").textContent = result;
        }
    </script>
</body>
</html>
